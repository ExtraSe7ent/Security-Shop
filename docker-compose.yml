services:
  postgres:
    image: postgres:16-alpine        # thêm -alpine: nhẹ hơn 3x, đủ dùng
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ecommerce_db"]
      interval: 5s      # kiểm tra mỗi 5 giây
      timeout: 5s       # chờ tối đa 5 giây mỗi lần check
      retries: 5        # thử lại 5 lần trước khi báo lỗi
    restart: unless-stopped   # tự restart nếu crash

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy   # chờ postgres healthy mới chạy

volumes:
  postgres_data: