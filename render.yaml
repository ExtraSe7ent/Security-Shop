services:
  - type: web
    name: security-shop-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: HMAC_SECRET
        value: "securityshop-hmac-secret-2024"
      - key: MODE
        value: "secure"
